# bundle.conf -- lifekit default bundle definition (PRIMARY SOURCE).
#
# Read at runtime by the dogany-lifekit-setup skill (item list, kind, schedule)
# and referenced by docs. This file defines WHAT the bundle contains.
#
# Derived surfaces that must stay in sync when this list changes (drift watch):
#   - agents/.template/.claude/skills-bundle/<id>/   (dormant skill dirs)
#   - agents/.template/config/lifekit.conf           (BUNDLE_<ID> state keys)
#   - agents/.template/config/i18n/{en,ko}.json      (bundle.<id> description keys)
#   - agents/.template/routines/bundle/<id>.sh       (routine scripts)
#
# Format: <id> <TAB> <kind> <TAB> <schedule> <TAB> <desc_key>
#   id       kebab-case item id. State key = BUNDLE_<ID with - as _, uppercase>.
#   kind     skill | routine
#   schedule routines only: HH:MM (daily). '-' for skills.
#            Users may pick a different time during activation.
#   desc_key i18n key under config/i18n/<lang>.json for the one-line description
#            shown during conversational activation.
#
# weekly-review is intentionally NOT here for v1: it needs lifekit task verbs
# and a generic weekly data path first (tracked separately).
task-update	skill	-	bundle.task_update
diet-log	skill	-	bundle.diet_log
workout-log	skill	-	bundle.workout_log
appointment-log	skill	-	bundle.appointment_log
relationship	skill	-	bundle.relationship
relationship-care	skill	-	bundle.relationship-care
morning-brief	routine	06:00	bundle.morning_brief
daily-retro	routine	22:00	bundle.daily_retro
