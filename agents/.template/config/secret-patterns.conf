# secret-patterns.conf -- per-instance owner-identity patterns for secret-sweep.sh.
#
# Format: one pattern per line: <label>|<extended-regex>
# Blank lines and #-comments are ignored.
#
# These patterns are matched against tracked file contents AND git commit
# author/committer metadata. Add any string that must never appear in the
# shared/public git history (owner name, personal email, machine paths, etc.).
#
# Seeded at first-contact onboarding with the agent name as a starter pattern.
# Expand with the owner's real name and email after onboarding completes.
#
# Examples (uncomment and fill in):
#   owner-email|alice@example\.com
#   owner-name|Alice Example
#   machine-path|/Users/alice/
#
# The structural scans (telegram-token, generic-key, env-secret-line,
# forbidden-tracked-file) are always on regardless of this file.
