# lifekit.conf -- per-instance lifekit activation state (non-secret).
#
# Written by the dogany-lifekit-setup skill; users may also edit by hand and
# then ask the agent to "apply lifekit settings" (the skill reconciles state
# -> actual symlinks/schedules idempotently).
#
# LIFEKIT lifecycle:
#   pending  fresh mint; the agent offers the lifekit walkthrough once after
#            user onboarding completes.
#   offered  the offer was made (or declined for now); no more auto-prompts.
#            The user can start anytime ("set up life management").
#   on       bundle active (per-item BUNDLE_* flags say which items).
#   off      lifekit declined; agent does not bring it up.
#
# BUNDLE_<ID>: on | off | (empty = undecided). Item ids and descriptions come
# from service/lifekit/bundle.conf (primary source).
#
# NOTE (mint contract): mint.sh copies this scaffold ONLY if the instance has
# no lifekit.conf yet (write-if-absent, same contract as .env / lifekit.db),
# so a re-mint / reconfigure never resets user choices.
LIFEKIT=pending
BUNDLE_TASK_UPDATE=
BUNDLE_DIET_LOG=
BUNDLE_WORKOUT_LOG=
BUNDLE_APPOINTMENT_LOG=
BUNDLE_RELATIONSHIP=
BUNDLE_MORNING_BRIEF=
BUNDLE_DAILY_RETRO=
# MIRROR_MODULE: on | off. Enables GCal/GTasks mirror (DGN-180/DGN-259).
# Requires mirror/ dir present and gws CLI configured. Default off.
MIRROR_MODULE=off
# MIRROR_OPS_ENV_FILE: absolute path to an operator-channel push .env
# (DGN-306/DGN-364). When set AND the file exists, mirror ops reports
# (weekly reconcile_report) route to the operator channel via
# push.sh --env with an agent-labeled prefix (i18n mirror.ops.prefix,
# label from DOGANY_AGENT_LABEL). Unset or missing file -> all
# notifications deliver to the persona channel (default).
#MIRROR_OPS_ENV_FILE=
# MIRROR_TASKLIST_NAME: DEPRECATED (DGN-364 m5). In the multi-calendar
# path the checklist display name comes from MIRROR_CAL_NAME prefix +
# i18n (mirror.gtasks.checklist). Still honored by legacy single-calendar
# bootstrap(); silently unused in multi mode.
#MIRROR_TASKLIST_NAME=
