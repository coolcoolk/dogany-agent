# agent.conf — non-secret agent configuration (portable, distributable).
# Secrets (bot token, chat id, API tokens) live in .telegram_bot/.env, NOT here.
#
# AGENT_LANG selects the i18n locale under config/i18n/<lang>.json.
# Supported out of the box: en, ko. Add more by dropping a new <lang>.json.
AGENT_LANG=en

# Optional: override the user's form-of-address without editing locale files.
# If empty, the locale file's "address" value is used.
AGENT_ADDRESS=

# Timezone offset in integer hours from UTC (e.g. 9 for UTC+9/KST, -5 for EST).
# Used by lifekit bundle routines (morning-brief, daily-retro) to compute
# local-day boundaries for event-window queries. Default: 0 (UTC).
AGENT_TZ_OFFSET_HOURS=0

# Morning-brief schedule title-prefix exclusion. Comma-separated list of
# title prefixes; a schedule event whose title (after stripping leading
# whitespace) starts with any listed prefix is omitted from the morning
# brief. Plain string prefix, no regex. Empty/missing = show all events.
BRIEF_EXCLUDE_TITLE_PREFIXES=

# Daily-retro content-experience keyword list (comma-separated). An
# appointment whose title contains any keyword triggers a specific
# impressions/review question in the retro. Empty/missing = off.
RETRO_CONTENT_TITLE_KEYWORDS=

# Coordinates for the morning-brief weather section (Open-Meteo, no API key).
# Both AGENT_LAT and AGENT_LNG must be set (non-empty) for the weather section
# to appear; if either is empty or missing the section is silently omitted.
# Example: Seoul = 37.5665 / 126.9780
AGENT_LAT=
AGENT_LNG=

# PORTFOLIO lifecycle (dogany-portfolio-setup skill; universal portfolio
# index, core v1 -- docs/PORTFOLIO-CORE.md in the framework repo):
#   pending  fresh mint; the agent offers the portfolio walkthrough once
#            after user onboarding completes (tier-free; never in the same
#            session as the lifekit offer -- lifekit goes first).
#   offered  the offer was made (or declined for now); no more auto-prompts.
#            The user can start anytime ("set up a portfolio").
#   on       an index exists (created by explicit opt-in only).
#   off      declined; agent does not bring it up.
# Existing instances (key absent): never auto-offered -- soft migration is
# operator-initiated by asking. No index file is ever pre-created.
PORTFOLIO=pending
